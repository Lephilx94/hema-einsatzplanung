<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HEMA Einsatzplanung</title>
<style>
  :root {
    --brand:#005987; --brand-dark:#004a70; --brand-light:#3a86ab;
    --bg:#f3f4f6; --panel:#ffffff; --text:#111827; --muted:#6b7280;
    --border:#e5e7eb; --border-soft:#f1f3f5; --hover:#f3f4f6; --weekend:#eef4f8;
    --grid:#dfe4ea; --grid-strong:#b8c2cf;
    --c-montage:#005987; --c-tentative:#16a34a; --c-urlaub:#eab308; --c-sonstiges:#dc2626;
  }
  body.dark {
    --bg:#0b0f14; --panel:#111827; --text:#e5e7eb; --muted:#9ca3af;
    --border:#1f2937; --border-soft:#1a2230; --hover:#1a2230; --weekend:#161f29;
    --grid:#283142; --grid-strong:#3b4760;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); }
  button { font-family:inherit; cursor:pointer; }
  a { color:inherit; }
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(120,120,120,.4);border-radius:5px}

  header { position:sticky; top:0; z-index:60; background:var(--panel);
    border-bottom:1px solid var(--border); }
  .bar-top { display:flex; align-items:center; justify-content:space-between;
    max-width:1600px; margin:0 auto; padding:10px 16px; gap:8px; }
  .brand-wrap { display:flex; align-items:center; gap:8px; }
  .logo-img { height:36px; width:auto; display:block; flex:0 0 auto; }
  body.dark .logo-img { filter:brightness(1.35) saturate(1.1); }
  h1 { font-size:18px; margin:0; font-weight:700; }
  .actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .btn { border:1px solid var(--border); background:var(--panel); color:var(--text);
    border-radius:9px; padding:6px 12px; font-size:14px; font-weight:500; }
  .btn:hover { background:var(--hover); }
  .btn-primary { background:var(--brand); border-color:var(--brand); color:#fff; }
  .btn-primary:hover { background:var(--brand-dark); }
  .btn-ghost { border:none; background:transparent; color:var(--muted); padding:6px 10px; border-radius:9px; }
  .btn-ghost:hover { background:var(--hover); }

  .nav-row { display:flex; align-items:center; justify-content:space-between; gap:8px;
    max-width:1600px; margin:0 auto; padding:0 16px 8px; }
  nav { display:flex; gap:4px; overflow-x:auto; }
  .tab { white-space:nowrap; border:none; background:transparent; color:var(--muted);
    border-radius:9px; padding:6px 12px; font-size:14px; font-weight:500; }
  .tab:hover { background:var(--hover); }
  .tab.active { background:var(--brand); color:#fff; }

  .legend { display:flex; flex-wrap:wrap; gap:8px 16px; font-size:12px; color:var(--muted); align-items:center; }
  .legend span { display:inline-flex; align-items:center; gap:6px; }
  .swatch { width:12px; height:12px; border-radius:3px; display:inline-block; }

  main { max-width:1600px; margin:0 auto; padding:20px 16px; }

  /* toolbar grid */
  .toolbar { display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-bottom:12px; }
  .grow { margin-left:auto; }
  select, input[type=text], input[type=date], input[type=number], textarea {
    font-family:inherit; font-size:14px; color:var(--text); background:var(--panel);
    border:1px solid var(--border); border-radius:9px; padding:7px 10px; }
  select:focus, input:focus, textarea:focus { outline:2px solid var(--brand); outline-offset:0; }
  .hint { font-size:12px; color:var(--muted); }

  /* GRID */
  .grid-wrap { overflow:auto; border:1px solid var(--border); border-radius:16px;
    background:var(--panel); max-height:calc(100vh - 220px); }
  .hrow { display:flex; }
  .corner, .name-cell, .group-name {
    position:sticky; left:0; flex:0 0 auto; background:var(--panel); }
  .hrow.month { position:sticky; top:0; z-index:40; }
  .hrow.kw    { position:sticky; z-index:40; }
  .hrow.days  { position:sticky; z-index:40; }
  .month-seg { border-bottom:1px solid var(--border); border-right:1px solid var(--border);
    padding:4px 8px; font-size:12px; font-weight:600; overflow:hidden; white-space:nowrap;
    background:var(--hover); height:26px; }
  .kw-seg { border-bottom:1px solid var(--border); border-right:1px solid var(--border);
    font-size:11px; color:var(--muted); text-align:center; overflow:hidden; white-space:nowrap;
    height:22px; line-height:22px; background:var(--bg); }
  .corner-month { border-bottom:1px solid var(--border); border-right:1px solid var(--border);
    background:var(--hover); height:26px; z-index:50; }
  .corner-kw { border-bottom:1px solid var(--border); border-right:1px solid var(--border);
    background:var(--bg); height:22px; z-index:50; }
  .corner-day { border-bottom:1px solid var(--border); border-right:1px solid var(--border);
    background:var(--panel); height:40px; z-index:50; display:flex; align-items:center;
    padding:0 12px; font-size:12px; font-weight:600; color:var(--muted); }
  .day-head { border-bottom:1px solid var(--grid); border-right:1px solid var(--grid);
    text-align:center; font-size:10px; height:40px; }
  .day-head.we { background:var(--weekend); }
  .day-head.wk { border-left:2px solid var(--grid-strong); }
  .day-head .wd { padding-top:4px; color:var(--muted); }
  .day-head .dn { color:var(--text); }
  .day-head.today .wd { color:var(--brand); font-weight:700; }
  .day-head.today .dn { background:var(--brand); color:#fff; border-radius:4px;
    width:20px; height:16px; line-height:16px; margin:2px auto 0; }
  .group-name { z-index:30; border-bottom:1px solid var(--border); border-right:1px solid var(--border);
    background:color-mix(in srgb,var(--brand) 12%, var(--panel));
    color:var(--brand); font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.04em; padding:4px 12px; }
  .group-fill { background:color-mix(in srgb,var(--brand) 6%, var(--panel));
    border-bottom:1px solid var(--border); }
  .name-cell { z-index:30; border-bottom:1px solid var(--grid-strong); border-right:1px solid var(--border);
    display:flex; align-items:center; padding:0 12px; font-size:14px; font-weight:500; }
  .track { position:relative; border-bottom:1px solid var(--grid-strong); cursor:pointer; }
  .bg-cells { position:absolute; inset:0; display:flex; }
  .bg-day { border-right:1px solid var(--grid); }
  .bg-day.wk { border-left:2px solid var(--grid-strong); }
  .bg-day.we { background:var(--weekend); }
  .today-line { position:absolute; top:0; bottom:0; width:1px; background:var(--brand); opacity:.7; z-index:20; }
  .bar { position:absolute; z-index:10; display:flex; align-items:center; overflow:hidden;
    border-radius:5px; padding:0 6px; font-size:11px; font-weight:600; border:none;
    box-shadow:0 1px 2px rgba(0,0,0,.15); cursor:grab; user-select:none; }
  .bar:hover { filter:brightness(1.08); }
  .bar.dragging { cursor:grabbing; z-index:30; box-shadow:0 4px 12px rgba(0,0,0,.3); }
  .bar-label { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; pointer-events:none; flex:1; }
  .bar-h-l, .bar-h-r { position:absolute; top:0; bottom:0; width:8px; cursor:ew-resize; z-index:2; }
  .bar-h-l { left:0; } .bar-h-r { right:0; }
  /* Wer-ist-frei-Übersicht */
  .avail-board { margin-bottom:14px; }
  .avail-cols { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .avail-col h4 { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin:0 0 8px;
    display:flex; align-items:center; gap:6px; color:var(--muted); }
  details.avail-col { border:1px solid var(--border); border-radius:10px; padding:8px 10px; background:var(--panel); }
  details.avail-col > summary { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    display:flex; align-items:center; gap:6px; color:var(--muted); cursor:pointer; user-select:none; list-style:none; }
  details.avail-col > summary::-webkit-details-marker { display:none; }
  details.avail-col > summary .chev { margin-left:auto; transition:transform .15s ease; color:var(--muted); font-size:12px; }
  details.avail-col[open] > summary .chev { transform:rotate(90deg); }
  details.avail-col .avail-names { margin-top:10px; }
  .avail-col .cdot { width:9px; height:9px; border-radius:999px; display:inline-block; }
  .chip { display:inline-flex; align-items:center; gap:6px; background:var(--hover); border-radius:999px;
    padding:3px 10px 3px 3px; font-size:13px; margin:0 6px 6px 0; }
  .chip-empty { color:var(--muted); font-size:13px; }
  .pos-readout { font-weight:600; font-size:13px; color:#fff; background:#005987;
    padding:5px 12px; border-radius:6px; white-space:nowrap; }
  .scroll-marker { position:absolute; top:0; bottom:0; pointer-events:none; z-index:22;
    border-left:3px solid #ea580c; box-shadow:0 0 0 1px rgba(234,88,12,.15), 2px 0 7px rgba(234,88,12,.30); }
  .scroll-marker-flag { position:absolute; top:0; left:0; transform:translateX(-1px);
    background:#ea580c; color:#fff; font-size:11px; font-weight:700; line-height:1; white-space:nowrap;
    padding:4px 8px; border-radius:0 6px 6px 0; box-shadow:0 2px 6px rgba(0,0,0,.25); }
  [data-theme="dark"] .scroll-marker { border-left-color:#fb923c; }
  [data-theme="dark"] .scroll-marker-flag { background:#fb923c; color:#1f2937; }
  .color-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .swatches { display:flex; gap:6px; flex-wrap:wrap; }
  .swatch { width:24px; height:24px; border-radius:6px; border:1px solid rgba(0,0,0,.18); cursor:pointer; padding:0; }
  .swatch.sel { outline:2px solid var(--brand); outline-offset:1px; }
  .swatch-auto { width:auto; height:24px; padding:0 8px; font-size:11px; font-weight:600; background:var(--hover); color:inherit; }
  .color-custom { width:38px; height:30px; padding:0; border:1px solid var(--border); border-radius:6px; background:none; cursor:pointer; }
  .cloud-pill { display:inline-flex; align-items:center; gap:7px; padding:6px 12px; border:1px solid var(--border);
    border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; user-select:none; background:var(--card); }
  .cloud-pill:hover { background:var(--hover); }
  .cdot2 { width:9px; height:9px; border-radius:999px; display:inline-block; }
  @media (max-width:700px){ .avail-cols{ grid-template-columns:1fr; } }

  /* TABLE */
  table { width:100%; border-collapse:collapse; font-size:14px; background:var(--panel);
    border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  th { text-align:left; font-weight:500; color:var(--muted); padding:12px 16px;
    background:var(--hover); font-size:13px; }
  td { padding:12px 16px; border-top:1px solid var(--border); }
  tr:hover td { background:var(--hover); }
  .group-row td { background:color-mix(in srgb,var(--brand) 10%, var(--panel));
    color:var(--brand); font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
  .group-row:hover td { background:color-mix(in srgb,var(--brand) 10%, var(--panel)); }
  .pill { display:inline-flex; align-items:center; border-radius:999px; padding:2px 9px;
    font-size:12px; font-weight:600; color:#fff; }
  .avatar { display:inline-flex; align-items:center; justify-content:center; border-radius:999px;
    color:#fff; font-weight:700; flex:0 0 auto; line-height:1; letter-spacing:.02em;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.15); }
  .filter-group { display:flex; flex-wrap:wrap; gap:4px; background:var(--hover);
    border-radius:11px; padding:4px; }
  .filter-group .tab.active { background:var(--brand); }

  /* cards */
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
  .card { border:1px solid var(--border); background:var(--panel); color:var(--text); border-radius:14px; padding:16px; }
  .card.click { text-align:left; }
  .card.click:hover { border-color:var(--brand); }
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; }
  .stat-box { background:var(--hover); border-radius:12px; padding:16px; }
  .stat-num { font-size:26px; font-weight:700; }
  .stat-label { font-size:12px; color:var(--muted); margin-top:4px; }
  .barline-wrap { margin-bottom:8px; }
  .barline-top { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:3px; }
  .barline-track { height:8px; border-radius:999px; background:var(--hover); }
  .barline-fill { height:100%; border-radius:999px; }
  .section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    color:var(--brand); margin:0 0 10px; }

  /* MODAL */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000;
    display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal { width:100%; max-width:560px; background:var(--panel); border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,.35); max-height:90vh; overflow:auto; }
  .modal-head { display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; border-bottom:1px solid var(--border); }
  .modal-head h2 { font-size:18px; margin:0; }
  .modal-body { padding:18px 24px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .modal-body .full { grid-column:1 / -1; }
  .field label { display:block; font-size:13px; font-weight:500; color:var(--muted); margin-bottom:5px; }
  .field input, .field select, .field textarea { width:100%; }
  .modal-foot { display:flex; align-items:center; justify-content:space-between;
    padding:14px 24px; border-top:1px solid var(--border); }
  .err { color:#dc2626; font-size:13px; padding:0 24px; }
  .close-x { border:none; background:transparent; font-size:22px; color:var(--muted); }
  .danger { color:#dc2626; border:none; background:transparent; font-weight:500; padding:8px 10px; border-radius:9px; }
  .danger:hover { background:rgba(220,38,38,.1); }
  .empty { padding:40px; text-align:center; color:var(--muted); font-size:14px; }
  /* Wizard / Verfügbarkeit */
  .stepper { display:flex; align-items:center; gap:6px; padding:16px 24px 0; font-size:12px; color:var(--muted); }
  .dot { width:22px; height:22px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center;
    background:var(--hover); color:var(--muted); font-weight:700; font-size:12px; }
  .dot.cur { background:var(--brand); color:#fff; }
  .dot.done { background:var(--brand-light); color:#fff; }
  .dot-l { margin-right:4px; }
  .dot-l.on { color:var(--text); font-weight:500; }
  .sep { flex:1; height:1px; background:var(--border); min-width:10px; }
  .avail { border-radius:10px; padding:10px 12px; font-size:13px; line-height:1.45; }
  .avail ul { margin:6px 0 0 18px; padding:0; }
  .avail.ok { background:rgba(22,163,74,.12); color:#15803d; }
  .avail.warn { background:rgba(234,179,8,.18); color:#92400e; }
  body.dark .avail.ok { color:#86efac; }
  body.dark .avail.warn { color:#fde68a; }
  /* Status-Badges (Einsätze) */
  .stat-badge { display:inline-flex; align-items:center; gap:5px; border-radius:999px;
    padding:2px 10px; font-size:12px; font-weight:600; white-space:nowrap; }
  .stat-badge.live { background:#005987; color:#fff; }
  .stat-badge.planned { background:#eab308; color:#1f2937; }
  .stat-badge.done { background:#16a34a; color:#fff; }
  .live-dot { width:7px; height:7px; border-radius:999px; background:currentColor; animation:blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
  @media (max-width:560px){ .modal-body{ grid-template-columns:1fr; } .legend{display:none;} }
</style>  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function(){
  "use strict";

  // ---------- Konstanten ----------
  var DAY_W = 34, NAME_W = 180, BAR_H = 22, BAR_GAP = 3, ROW_PAD = 6;
  var TYPES = ["montage","montage_tentative","urlaub","sonstiges"];
  var TYPE_LABEL = { montage:"Montage", montage_tentative:"Montage evtl. ?", urlaub:"Urlaub", sonstiges:"Sonstiges" };
  var TYPE_COLOR = { montage:"#005987", montage_tentative:"#16a34a", urlaub:"#eab308", sonstiges:"#dc2626" };
  var TYPE_TEXT  = { montage:"#fff", montage_tentative:"#fff", urlaub:"#1f2937", sonstiges:"#fff" };
  var STATUS_LABEL = { active:"läuft", planned:"geplant", completed:"abgeschlossen" };
  var MONTHS = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  var WEEKDAYS = ["Mo","Di","Mi","Do","Fr","Sa","So"];
  var COUNTRIES_BY_CONTINENT = {
    "Europa": ["Albanien","Andorra","Belgien","Bosnien und Herzegowina","Bulgarien","Dänemark","Deutschland","Estland","Finnland","Frankreich","Griechenland","Irland","Island","Italien","Kosovo","Kroatien","Lettland","Liechtenstein","Litauen","Luxemburg","Malta","Moldau","Monaco","Montenegro","Niederlande","Nordmazedonien","Norwegen","Österreich","Polen","Portugal","Rumänien","Russland","San Marino","Schweden","Schweiz","Serbien","Slowakei","Slowenien","Spanien","Tschechien","Ukraine","Ungarn","Vatikanstadt","Vereinigtes Königreich","Weißrussland","Zypern"],

    "Asien": ["Afghanistan","Armenien","Aserbaidschan","Bahrain","Bangladesch","Bhutan","Brunei","China","Georgien","Indien","Indonesien","Irak","Iran","Israel","Japan","Jemen","Jordanien","Kambodscha","Kasachstan","Katar","Kirgisistan","Kuwait","Laos","Libanon","Malaysia","Malediven","Mongolei","Myanmar","Nepal","Nordkorea","Oman","Osttimor","Pakistan","Philippinen","Saudi-Arabien","Singapur","Sri Lanka","Südkorea","Syrien","Tadschikistan","Thailand","Türkei","Turkmenistan","Usbekistan","Vereinigte Arabische Emirate","Vietnam"],
    "Nordamerika": ["Antigua und Barbuda","Bahamas","Barbados","Belize","Costa Rica","Dominica","Dominikanische Republik","El Salvador","Grenada","Guatemala","Haiti","Honduras","Jamaika","Kanada","Kuba","Mexiko","Nicaragua","Panama","St. Kitts und Nevis","St. Lucia","St. Vincent und die Grenadinen","Trinidad und Tobago","USA"],
    "Südamerika": ["Argentinien","Bolivien","Brasilien","Chile","Ecuador","Guyana","Kolumbien","Paraguay","Peru","Suriname","Uruguay","Venezuela"],
    "Australien & Ozeanien": ["Australien","Fidschi","Kiribati","Marshallinseln","Mikronesien","Nauru","Neuseeland","Palau","Papua-Neuguinea","Salomonen","Samoa","Tonga","Tuvalu","Vanuatu"]
  };
  var CONTINENT_ORDER = ["Europa","Afrika","Asien","Nordamerika","Südamerika","Australien & Ozeanien"];
  var COUNTRIES = CONTINENT_ORDER.reduce(function(acc,c){ return acc.concat(COUNTRIES_BY_CONTINENT[c]); }, []);

  // ---------- Datum-Helfer ----------
  function pad(n){ return String(n).padStart(2,"0"); }
  function iso(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function parseIso(s){ var p=s.split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); }
  function addDays(d,n){ var r=new Date(d); r.setDate(r.getDate()+n); return r; }
  function startOfWeek(d){ var day=(d.getDay()+6)%7; return addDays(d,-day); }
  function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
  function diffDays(a,b){ return Math.round((b-a)/86400000); }
  function isWeekend(d){ var w=d.getDay(); return w===0||w===6; }
  function isoWeek(d){
    var date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    var dn=(date.getUTCDay()+6)%7; date.setUTCDate(date.getUTCDate()-dn+3);
    var ft=new Date(Date.UTC(date.getUTCFullYear(),0,4)); var fd=(ft.getUTCDay()+6)%7;
    ft.setUTCDate(ft.getUTCDate()-fd+3);
    return 1+Math.round((date-ft)/(7*86400000));
  }
  function fmtDE(s){ var p=s.split("-"); return p[2]+"."+p[1]+"."+p[0]; }
  function computeStatus(s,e){ var t=iso(new Date()); if(t<s)return"planned"; if(t>e)return"completed"; return"active"; }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }

  // ---------- Speicher ----------
  var KEY="hema_einsatzplanung_v1";
  var memoryStore=null;

  // ======== CLOUD (Supabase) – optional, mit lokalem Fallback ========

  // Bleiben beide leer (und es wurde nichts im Dialog gespeichert), läuft die App lokal wie bisher.
  var SUPABASE_URL  = "https://tjxcwkfhtyfkbpqwuqmy.supabase.co";   // z. B. "https://xxxxxxxx.supabase.co"
  var SUPABASE_ANON = "sb_publishable_PZa6Sid3ECqgX3CCASOWJQ_CXK3thwZ";   // anon public key (öffentlich, durch RLS geschützt)

  // ===== VERSIONS-DATUM =====
  // Nach jeder Änderung hier das Datum anpassen, dann sieht man oben im Kopf sofort, welche Version geladen ist.
  var APP_VERSION = "24.06.2026";

  var cloud = { sb:null, on:false, status:"local", error:"", subscribed:false };
  function _ls(k){ try{ return localStorage.getItem(k)||""; }catch(e){ return ""; } }
  function cloudCfg(){
    return { url:(SUPABASE_URL||_ls("hema_sb_url")).trim(), key:(SUPABASE_ANON||_ls("hema_sb_key")).trim() };
  }
  function initCloud(){
    var c=cloudCfg();
    if(c.url && c.key && window.supabase && window.supabase.createClient){
      try{ cloud.sb=window.supabase.createClient(c.url,c.key); cloud.on=true; cloud.status="connecting"; cloud.subscribed=false; }
      catch(e){ cloud.on=false; cloud.status="error"; cloud.error=String(e&&e.message||e); }
    } else { cloud.on=false; cloud.status="local"; }
  }
  function cloudErr(e){ cloud.error=String(e&&e.message||e); cloud.status="error"; console.warn("Supabase:",cloud.error); }
  function cloudUpsert(table,row){ if(!cloud.on) return; try{ cloud.sb.from(table).upsert(row).then(function(r){ if(r.error) cloudErr(r.error); }); }catch(e){ cloudErr(e); } }
  function cloudDelete(table,id){ if(!cloud.on) return; try{ cloud.sb.from(table).delete().eq("id",id).then(function(r){ if(r.error) cloudErr(r.error); }); }catch(e){ cloudErr(e); } }
  function mapEmp(x){ return {id:x.id,name:x.name,team:x.team||"",sort_order:x.sort_order||0,color:x.color||""}; }
  function mapAsg(x){ return {id:x.id,employee_id:x.employee_id,type:x.type,label:x.label||"",country:x.country||"",city:x.city||"",start_date:x.start_date,end_date:x.end_date,notes:x.notes||""}; }
  function cloudLoad(){
    if(!cloud.on) return;
    Promise.all([ cloud.sb.from("employees").select("*"), cloud.sb.from("assignments").select("*") ]).then(function(res){
      if(res[0].error) throw res[0].error; if(res[1].error) throw res[1].error;
      store.employees=(res[0].data||[]).map(mapEmp);
      store.assignments=(res[1].data||[]).map(mapAsg);
      cloud.status="connected"; cloud.error="";
      render(); cloudSubscribe();
    }).catch(function(err){ cloudErr(err); render(); });
  }
  function cloudSubscribe(){
    if(!cloud.on || cloud.subscribed) return;
    try{
      cloud.sb.channel("hema-rt")
        .on("postgres_changes",{event:"*",schema:"public",table:"employees"},function(p){ applyRemote(store.employees,p,mapEmp); scheduleRender(); })
        .on("postgres_changes",{event:"*",schema:"public",table:"assignments"},function(p){ applyRemote(store.assignments,p,mapAsg); scheduleRender(); })
        .subscribe();
      cloud.subscribed=true;
    }catch(e){ cloudErr(e); }
  }
  function applyRemote(arr,payload,map){
    if(payload.eventType==="DELETE"){ var id=payload.old&&payload.old.id; var i=arr.findIndex(function(x){return x.id===id;}); if(i>=0) arr.splice(i,1); }
    else { var row=map(payload.new); var j=arr.findIndex(function(x){return x.id===row.id;}); if(j>=0) arr[j]=row; else arr.push(row); }
  }
  var _renderTimer=null;
  function scheduleRender(){ clearTimeout(_renderTimer); _renderTimer=setTimeout(function(){
    var mr=document.getElementById("modal-root"); if(mr && mr.innerHTML) return; render();
  }, 150); }
  function newId(){ return Date.now()*1000 + Math.floor(Math.random()*1000); }

  function loadStore(){
    try{ var raw=localStorage.getItem(KEY); if(raw) return JSON.parse(raw); }catch(e){}
    if(memoryStore) return memoryStore;
    return null;
  }
  function saveStore(data){
    try{ localStorage.setItem(KEY, JSON.stringify(data)); }
    catch(e){ memoryStore=data; } // Fallback (z. B. in der Vorschau): nur im Speicher
  }

  function seed(){
    var t=new Date();
    var emps=[
      {id:1,name:"Erik Janz",team:"Mechanik",sort_order:1},
      {id:2,name:"Yilmaz Keskin",team:"Mechanik",sort_order:2},
      {id:3,name:"Udo Wienand",team:"Mechanik",sort_order:3},

      {id:6,name:"M 4",team:"Mechanik",sort_order:6},
      {id:7,name:"E 3",team:"Elektrik",sort_order:7}
    ];
    function A(id,eid,type,label,country,s,e,notes){
      return {id:id,employee_id:eid,type:type,label:label,country:country||"",city:"",
        start_date:iso(addDays(t,s)),end_date:iso(addDays(t,e)),notes:notes||""};
    }
    var asg=[
      A(1,1,"montage","ALKA","Deutschland",-2,12,"Inbetriebnahme"),
      A(2,2,"urlaub","Urlaub","",14,21,""),

      A(5,5,"montage","MDLZ LHF France","Frankreich",0,6,"Mondelez Werk"),
      A(6,5,"sonstiges","Schulung","Deutschland",3,4,"")
    ];
    return {employees:emps,assignments:asg,seqE:8,seqA:7};
  }

  // ---------- State ----------
  var store = loadStore() || seed();
  if(store.seqE==null) store.seqE = Math.max(0,...store.employees.map(function(e){return e.id;}))+1;
  if(store.seqA==null) store.seqA = Math.max(0,...store.assignments.map(function(a){return a.id;}))+1;

  // Migration: altes Team "Montage" -> "Mechanik" (datenschonend, behält alle Einträge)
  (function(){ var changed=false;
    store.employees.forEach(function(e){ if(e.team==="Montage"){ e.team="Mechanik"; changed=true; } });
    if(changed) saveStore(store);
  })();

  var ui = {
    tab:"plan",
    theme:(function(){ try{return localStorage.getItem("hema_theme")||"light";}catch(e){return"light";} })(),
    weeks:12,
    windowStart: iso(startOfWeek(new Date())),
    search:"",
    typeFilter:"",
    statsYear:String(new Date().getFullYear()),
    statsTeam:"",
    statsEmp:"",
    teamFilter:"",
    selectedEmployee:null
  };

  function persist(){ saveStore(store); }
  function setTheme(t){ ui.theme=t; try{localStorage.setItem("hema_theme",t);}catch(e){}
    document.body.classList.toggle("dark", t==="dark"); }

  // ---------- Daten-Operationen ----------
  function employeesSorted(){
    return store.employees.slice().sort(function(a,b){
      return (a.sort_order-b.sort_order)||a.name.localeCompare(b.name);
    });
  }
  function teams(){ var s={}; store.employees.forEach(function(e){ if(e.team)s[e.team]=1; }); return Object.keys(s); }
  function empName(id){ var e=store.employees.find(function(x){return x.id===id;}); return e?e.name:"?"; }
  function empTeam(id){ var e=store.employees.find(function(x){return x.id===id;}); return e?e.team:""; }

  function upsertEmployee(input,id){
    var row;
    if(id){ var e=store.employees.find(function(x){return x.id===id;});
      Object.assign(e,{name:input.name,team:input.team||"",sort_order:+input.sort_order||0,color:input.color||""}); row=e; }
    else { row={id:newId(),name:input.name,team:input.team||"",sort_order:+input.sort_order||0,color:input.color||""}; store.employees.push(row); }
    persist(); cloudUpsert("employees", row);
  }
  function deleteEmployee(id){
    store.employees=store.employees.filter(function(x){return x.id!==id;});
    store.assignments=store.assignments.filter(function(a){return a.employee_id!==id;});
    persist(); cloudDelete("employees", id);
  }
  function upsertAssignment(input,id){
    var rec={employee_id:+input.employee_id,type:input.type,label:input.label||"",country:input.country||"",
      city:input.city||"",start_date:input.start_date,end_date:input.end_date,notes:input.notes||""};
    var row;
    if(id){ var a=store.assignments.find(function(x){return x.id===id;}); Object.assign(a,rec); row=a; }
    else { rec.id=newId(); store.assignments.push(rec); row=rec; }
    persist(); cloudUpsert("assignments", row);
  }
  function deleteAssignment(id){ store.assignments=store.assignments.filter(function(x){return x.id!==id;}); persist(); cloudDelete("assignments", id); }

  // ---------- Render: Planungsraster ----------
  function placeBars(items, winStart, totalDays){
    var winEnd=addDays(winStart,totalDays-1);
    var sorted=items.slice().sort(function(a,b){return a.start_date.localeCompare(b.start_date);});
    var laneEnds=[]; var bars=[];
    sorted.forEach(function(a){
      var aS=parseIso(a.start_date), aE=parseIso(a.end_date);
      if(aE<winStart||aS>winEnd) return;
      var s=aS<winStart?winStart:aS, e=aE>winEnd?winEnd:aE;
      var leftDays=diffDays(winStart,s), span=diffDays(s,e)+1;
      var lane=-1;
      for(var i=0;i<laneEnds.length;i++){ if(laneEnds[i]<aS){lane=i;break;} }
      if(lane===-1){ lane=laneEnds.length; laneEnds.push(aE); } else { laneEnds[lane]=aE; }
      bars.push({a:a,left:leftDays*DAY_W+1,width:span*DAY_W-2,lane:lane});
    });
    return {bars:bars,lanes:Math.max(1,laneEnds.length)};
  }

  // Inhalt der "Wer ist frei?"-Übersicht für eine bestimmte Woche
  function availInner(weekStart){
    var wkS=weekStart, wkE=addDays(weekStart,6);
    var emps=employeesSorted().filter(function(e){ return !ui.teamFilter || (e.team||"Ohne Team")===ui.teamFilter; });
    var byEmp={}; store.assignments.forEach(function(a){ (byEmp[a.employee_id]=byEmp[a.employee_id]||[]).push(a); });
    function ov(a){ var s=parseIso(a.start_date), e=parseIso(a.end_date); return s<=wkE && e>=wkS; }
    var freeE=[],busyE=[],urlaubE=[];
    emps.forEach(function(emp){ var mine=(byEmp[emp.id]||[]).filter(ov);
      var hasU=mine.some(function(a){return a.type==="urlaub";}), hasE=mine.some(function(a){return a.type!=="urlaub";});
      if(hasE)busyE.push(emp); if(hasU)urlaubE.push(emp); if(!hasE&&!hasU)freeE.push(emp); });
    function chips(list){ return list.length ? list.map(function(e){ return '<span class="chip">'+avatar(e.name,20,e.color)+esc(e.name)+'</span>'; }).join("") : '<span class="chip-empty">–</span>'; }
    function col(title,color,list){
      return '<details class="avail-col">'+
        '<summary><span class="cdot" style="background:'+color+'"></span>'+title+' ('+list.length+')<span class="chev">▸</span></summary>'+
        '<div class="avail-names">'+chips(list)+'</div>'+
      '</details>';
    }
    var isThis = iso(wkS)===iso(startOfWeek(new Date()));
    return '<h3 class="section-title" style="margin-bottom:10px">Wer ist frei? · '+(isThis?"Diese Woche · ":"")+'KW '+isoWeek(wkS)+' ('+fmtDE(iso(wkS))+'–'+fmtDE(iso(wkE))+') <span class="hint" style="font-weight:400;text-transform:none;letter-spacing:0">· zum Aufklappen auf eine Spalte klicken</span></h3>'+
      '<div class="avail-cols">'+
        col("Frei","#16a34a",freeE)+
        col("Im Einsatz","#005987",busyE)+
        col("Im Urlaub","#eab308",urlaubE)+
      '</div>';
  }

  function planHTML(){
    var anchor=parseIso(ui.windowStart);
    var pastDays=Math.min(ui.weeks,26)*7;     // Vergangenheit links (max. ~26 Wochen)
    var winStart=addDays(anchor,-pastDays);    // Render-Beginn liegt in der Vergangenheit
    var totalDays=ui.weeks*7 + pastDays;       // Vergangenheit + Zukunft
    var days=[]; for(var i=0;i<totalDays;i++) days.push(addDays(winStart,i));
    var gridW=totalDays*DAY_W, today=new Date();

    // Einsätze je Monteur
    var byEmp={}; store.assignments.forEach(function(a){ (byEmp[a.employee_id]=byEmp[a.employee_id]||[]).push(a); });

    // Segmente
    function segs(keyFn){ var out=[]; days.forEach(function(d){ var k=keyFn(d); var last=out[out.length-1];
      if(last&&last.label===k) last.days++; else out.push({label:k,days:1}); }); return out; }
    var months=segs(function(d){ return MONTHS[d.getMonth()]+" "+d.getFullYear(); });
    var weeks=segs(function(d){ return "KW "+isoWeek(d); });

    var monthRow=months.map(function(m){ return '<div class="month-seg" style="width:'+(m.days*DAY_W)+'px">'+m.label+'</div>'; }).join("");
    var kwRow=weeks.map(function(w){ return '<div class="kw-seg" style="width:'+(w.days*DAY_W)+'px">'+(w.days>=2?w.label:"")+'</div>'; }).join("");
    var dayRow=days.map(function(d){
      var we=isWeekend(d), td=sameDay(d,today), wk=(d.getDay()===1);
      return '<div class="day-head'+(we?" we":"")+(wk?" wk":"")+(td?" today":"")+'" style="width:'+DAY_W+'px">'+
        '<div class="wd">'+WEEKDAYS[(d.getDay()+6)%7]+'</div><div class="dn">'+pad(d.getDate())+'</div></div>';
    }).join("");

    var bgCells=days.map(function(d){ return '<div class="bg-day'+(isWeekend(d)?" we":"")+(d.getDay()===1?" wk":"")+'" style="width:'+DAY_W+'px"></div>'; }).join("");
    var todayOff=diffDays(winStart,today);
    var showToday=todayOff>=0&&todayOff<totalDays;
    var todayLine="";

    // Gruppen (mit Team-Filter)
    var visibleEmps=employeesSorted().filter(function(e){ return !ui.teamFilter || (e.team||"Ohne Team")===ui.teamFilter; });
    var groups={}; visibleEmps.forEach(function(e){ var k=e.team||"Ohne Team"; (groups[k]=groups[k]||[]).push(e); });

    var body="";
    Object.keys(groups).forEach(function(team){
      body+='<div class="hrow">'+
        '<div class="group-name" style="width:'+NAME_W+'px">'+esc(team)+'</div>'+
        '<div class="group-fill" style="width:'+gridW+'px"></div></div>';
      groups[team].forEach(function(emp){
        var p=placeBars(byEmp[emp.id]||[],winStart,totalDays);
        var rowH=p.lanes*(BAR_H+BAR_GAP)-BAR_GAP+ROW_PAD*2;
        var bars=p.bars.map(function(b){
          var dash=b.a.type==="montage_tentative"?"border:1px dashed #166534;":"";
          var txt=b.a.label||b.a.country||"—";
          var title=esc((b.a.label||"")+" "+(b.a.country?"· "+b.a.country:"")+" ("+b.a.start_date+" – "+b.a.end_date+")");
          return '<button class="bar" data-bar="'+b.a.id+'" title="'+title+'" style="left:'+b.left+'px;width:'+b.width+
            'px;top:'+(ROW_PAD+b.lane*(BAR_H+BAR_GAP))+'px;height:'+BAR_H+'px;background:'+TYPE_COLOR[b.a.type]+
            ';color:'+TYPE_TEXT[b.a.type]+';'+dash+'"><span class="bar-h-l"></span><span class="bar-label">'+esc(txt)+'</span><span class="bar-h-r"></span></button>';
        }).join("");
        body+='<div class="hrow">'+
          '<div class="name-cell" style="width:'+NAME_W+'px;height:'+rowH+'px">'+esc(emp.name)+'</div>'+
          '<div class="track" data-track="'+emp.id+'" style="width:'+gridW+'px;height:'+rowH+'px">'+
            '<div class="bg-cells">'+bgCells+'</div>'+todayLine+bars+
          '</div></div>';
      });
    });
    if(store.employees.length===0) body='<div class="empty">Noch keine Monteure angelegt.</div>';

    var weekChoices=[[8,"8 Wochen"],[12,"12 Wochen"],[16,"16 Wochen"],[26,"26 Wochen (½ Jahr)"],[52,"1 Jahr"],[104,"2 Jahre"],[156,"3 Jahre"],[208,"4 Jahre (bis ~2030)"]];
    var weeksOpts=weekChoices.map(function(c){ return '<option value="'+c[0]+'"'+(ui.weeks===c[0]?" selected":"")+'>'+c[1]+'</option>'; }).join("");
    var teamOpts2='<option value=""'+(!ui.teamFilter?" selected":"")+'>Alle Teams</option>'+
      teams().map(function(t){ return '<option value="'+esc(t)+'"'+(ui.teamFilter===t?" selected":"")+'>'+esc(t)+'</option>'; }).join("");

    // "Wer ist frei?" – folgt beim Scrollen der Woche am linken Rand (Start: aktuelle/Anker-Woche)
    var availBoard='<div class="card avail-board" id="avail-board">'+availInner(startOfWeek(parseIso(ui.windowStart)))+'</div>';

  function filteredAssignments(){
    var q=ui.search.trim().toLowerCase(), tf=ui.typeFilter, team=ui.teamFilter;
    return store.assignments.filter(function(a){
      if(tf&&a.type!==tf) return false;
      if(team){ var et=empTeam(a.employee_id)||"Ohne Team"; if(et!==team) return false; }
      if(q){ var hay=(empName(a.employee_id)+" "+(a.label||"")+" "+(a.country||"")).toLowerCase();
        if(hay.indexOf(q)===-1) return false; }
      return true;
    }).sort(function(a,b){
      var ea=store.employees.find(function(x){return x.id===a.employee_id;})||{};
      var eb=store.employees.find(function(x){return x.id===b.employee_id;})||{};
      var nm=(ea.name||"").localeCompare(eb.name||"","de");
      if(nm!==0) return nm;
      if(a.employee_id!==b.employee_id) return a.employee_id-b.employee_id;

  // Initialen-Avatar je Monteur (ersetzt das Ordner-Symbol)
  var AVATAR_COLORS = ["#005987","#1d4ed8","#2563eb","#0369a1","#0891b2","#0e7490","#0f766e","#047857","#15803d","#4d7c0f","#65a30d","#ca8a04","#b45309","#92400e","#c2410c","#dc2626","#b91c1c","#e11d48","#be123c","#9d174d","#db2777","#a21caf","#7e22ce","#6d28d9","#7c3aed","#4f46e5","#475569","#374151"];
  function initials(name){
    var p=String(name||"").trim().split(/\s+/).filter(Boolean);
    if(!p.length) return "?";
    var a=p[0][0]||"";
    var b=p.length>1 ? (p[p.length-1][0]||"") : "";
    return (a+b).toUpperCase();
  }
  function avatarColor(name){
    var h=0, s=String(name||""); for(var i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))|0; }
    return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length];
  }

  // ---------- Render: Statistik ----------
  function statsHTML(){
    // Jahre aus den Daten
    var yset={}; store.assignments.forEach(function(a){ yset[a.start_date.slice(0,4)]=1; yset[a.end_date.slice(0,4)]=1; });
    var cy=String(new Date().getFullYear()); yset[cy]=1;
    // Zukunftsjahre bis 2030 immer zur Auswahl anbieten
    var maxYear=Math.max(2030, new Date().getFullYear());
    for(var yy=new Date().getFullYear(); yy<=maxYear; yy++){ yset[String(yy)]=1; }
    var yearList=Object.keys(yset).sort();
    var sel = ui.statsYear || cy;
    if(sel!=="all" && yearList.indexOf(sel)===-1) sel=cy;

    // Tage eines Eintrags innerhalb des gewählten Jahres (inklusive)
    function daysIn(a){
      if(sel==="all") return diffDays(parseIso(a.start_date),parseIso(a.end_date))+1;
      var ys=parseIso(sel+"-01-01"), ye=parseIso(sel+"-12-31");
      var s=parseIso(a.start_date), e=parseIso(a.end_date);
      var aa=s>ys?s:ys, bb=e<ye?e:ye;
      if(bb<aa) return 0;
      return diffDays(aa,bb)+1;
    }
    // Werktage (Mo–Fr) eines Eintrags – Wochenenden zählen nicht (z. B. Urlaub)
    function workdaysIn(a){
      var s,e;
      if(sel==="all"){ s=parseIso(a.start_date); e=parseIso(a.end_date); }
      else { var ys=parseIso(sel+"-01-01"), ye=parseIso(sel+"-12-31"), ss=parseIso(a.start_date), ee=parseIso(a.end_date); s=ss>ys?ss:ys; e=ee<ye?ee:ye; }
      var total=diffDays(s,e); if(total<0) return 0;
      var n=0;
      for(var i=0;i<=total;i++){ if(!isWeekend(addDays(s,i))) n++; }
      return n;
    }

    var teamSel = ui.statsTeam || "";
    var empSel = ui.statsEmp || "";                 // "", "all" oder Monteur-ID
    var selEmpId = (empSel && empSel!=="all") ? +empSel : null;
    function inScope(empId){
      if(selEmpId!=null) return empId===selEmpId;   // einzelner Monteur: Team-Filter ignorieren
      return !teamSel || (empTeam(empId)||"Ohne Team")===teamSel;
    }

    var perEmp={}; employeesSorted().forEach(function(e){ perEmp[e.id]={montage:0,tentative:0,sonstiges:0,urlaub:0}; });
    var totM=0,totT=0,totS=0,totU=0;
    store.assignments.forEach(function(a){
      if(!inScope(a.employee_id)) return;
      var d=daysIn(a); if(d<=0) return;
      var p=perEmp[a.employee_id] || (perEmp[a.employee_id]={montage:0,tentative:0,sonstiges:0,urlaub:0});
      if(a.type==="montage"){ p.montage+=d; totM+=d; }
      else if(a.type==="montage_tentative"){ p.tentative+=d; totT+=d; }
      else if(a.type==="sonstiges"){ p.sonstiges+=d; totS+=d; }
      else if(a.type==="urlaub"){ var wd=workdaysIn(a); p.urlaub+=wd; totU+=wd; }
    });
    var totE = totM+totT+totS;

    var land={}; store.assignments.forEach(function(a){ if(!a.country) return; if(!inScope(a.employee_id)) return; var d=daysIn(a); if(d<=0) return;
      if(!land[a.country]) land[a.country]={count:0,days:0}; land[a.country].count++; land[a.country].days+=d; });
    var landArr=Object.keys(land).map(function(c){ return {country:c,count:land[c].count,days:land[c].days}; })
      .sort(function(x,y){ return y.days-x.days; });

    var yearOpts='<option value="all"'+(sel==="all"?" selected":"")+'>Gesamt</option>'+
      yearList.map(function(y){ return '<option value="'+y+'"'+(sel===y?" selected":"")+'>'+y+'</option>'; }).join("");

    function bigCard(label,val,color){ return '<div class="stat-box"><div class="stat-num" style="color:'+color+'">'+val+'</div><div class="stat-label">'+label+'</div></div>'; }

    var empRows=(function(){
      // Monteure nach Team gruppieren (Reihenfolge wie in der Plantafel), jedes Team genau einmal
      var groups={}, order=[];
      employeesSorted().forEach(function(e){
        var team=e.team||"Ohne Team";
        if(selEmpId!=null){ if(e.id!==selEmpId) return; }
        else if(teamSel && team!==teamSel){ return; }
        if(!groups[team]){ groups[team]=[]; order.push(team); }
        groups[team].push(e);
      });
      var rows="";
      order.forEach(function(team){
        rows+='<tr><td colspan="6" style="background:#eef2f7;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:12px;color:#334155;padding:6px 10px">'+esc(team)+'</td></tr>';
        groups[team].forEach(function(e){
          var p=perEmp[e.id]||{montage:0,tentative:0,sonstiges:0,urlaub:0};
          var eins=p.montage+p.tentative+p.sonstiges;
          rows+='<tr>'+
            '<td><span style="display:inline-flex;align-items:center;gap:8px">'+avatar(e.name,24,e.color)+'<span style="font-weight:500">'+esc(e.name)+'</span></span></td>'+
            '<td style="text-align:right">'+p.montage+'</td>'+
            '<td style="text-align:right">'+p.tentative+'</td>'+
            '<td style="text-align:right">'+p.sonstiges+'</td>'+
            '<td style="text-align:right;color:#b8860b">'+p.urlaub+'</td>'+
            '<td style="text-align:right;font-weight:700">'+eins+'</td>'+
          '</tr>';
        });
      });
      return rows;
    })();

    var landRows = landArr.length ? landArr.map(function(c){
      return '<tr><td>'+esc(c.country)+'</td><td style="text-align:right">'+c.count+'</td><td style="text-align:right;font-weight:600">'+c.days+'</td></tr>';
    }).join("") : '<tr><td colspan="3" class="hint" style="padding:16px">Keine Länder hinterlegt.</td></tr>';

    var periodLabel = sel==="all" ? "gesamter Zeitraum" : "Jahr "+sel;

    var teamStatOpts='<option value=""'+(!teamSel?" selected":"")+'>Alle Teams</option>'+
      teams().map(function(t){ return '<option value="'+esc(t)+'"'+(teamSel===t?" selected":"")+'>'+esc(t)+'</option>'; }).join("");

    // Monteur-Auswahl (nach Team gruppiert) inkl. "Alle Monteure"
    var byTeamS={};
    store.employees.forEach(function(e){ var k=e.team||"Ohne Team"; (byTeamS[k]=byTeamS[k]||[]).push(e); });
    var teamNamesS=Object.keys(byTeamS).sort(function(a,b){
      var ma=Math.min.apply(null, byTeamS[a].map(function(e){return e.sort_order;}));
      var mb=Math.min.apply(null, byTeamS[b].map(function(e){return e.sort_order;}));
      return ma-mb;
    });
    var empStatOpts='<option value=""'+(empSel===""?" selected":"")+'>— Monteur wählen —</option>'+
      '<option value="all"'+(empSel==="all"?" selected":"")+'>Alle Monteure</option>'+
      teamNamesS.map(function(t){
        var list=byTeamS[t].slice().sort(function(x,y){ return x.name.localeCompare(y.name,"de"); });
        return '<optgroup label="'+esc(t)+'">'+ list.map(function(e){
          return '<option value="'+e.id+'"'+(selEmpId===e.id?" selected":"")+'>'+esc(e.name)+'</option>';
        }).join("")+'</optgroup>';
      }).join("");

    var toolbar='<div class="toolbar"><span class="hint">Auswertung für:</span>'+
      '<select data-act="stats-year">'+yearOpts+'</select>'+
      '<span class="hint" style="margin-left:8px">Monteur:</span>'+
      '<select data-act="stats-emp" style="min-width:200px">'+empStatOpts+'</select>'+
      (empSel==="all" ? '<span class="hint" style="margin-left:8px">Team:</span><select data-act="stats-team">'+teamStatOpts+'</select>' : '')+
      '<span class="grow hint">Alle Werte in Tagen ('+periodLabel+').</span></div>';

    // Ohne Auswahl: nur Hinweis
    if(empSel===""){
      return toolbar+'<div class="card"><div class="empty" style="padding:40px;text-align:center;color:var(--muted)">Bitte oben einen Monteur (oder „Alle Monteure") auswählen, um die Auswertung zu sehen.</div></div>';
    }

    return ''+
    toolbar+

    '<div class="cards" style="grid-template-columns:1fr;gap:16px">'+
      '<div class="card"><h3 class="section-title">Tage pro Monteur ('+periodLabel+')</h3>'+
        '<div style="overflow-x:auto"><table><thead><tr>'+
          '<th>Monteur</th><th style="text-align:right">Montage</th><th style="text-align:right">Montage evtl.</th><th style="text-align:right">Sonstiges</th><th style="text-align:right">Urlaub</th><th style="text-align:right">Einsatztage</th>'+
        '</tr></thead><tbody>'+ (empRows||'<tr><td colspan="6" class="hint" style="padding:16px">Keine Monteure.</td></tr>') +'</tbody></table></div>'+
        '<p class="hint" style="margin-top:8px">„Einsatztage" = Montage + Montage evtl. + Sonstiges (ohne Urlaub). Urlaub zählt nur Werktage (Mo–Fr) – Wochenenden werden nicht mitgezählt.</p></div>'+

  // ---------- Render Haupt ----------
  function render(){
    var content = ui.tab==="plan"?planHTML(): ui.tab==="list"?listHTML(): ui.tab==="employees"?employeesHTML(): statsHTML();
    document.getElementById("app").innerHTML = headerHTML()+'<main>'+content+'</main>';
    var gs=document.getElementById("grid-scroll");
    if(gs){
      var s=parseInt(gs.getAttribute("data-init-scroll"),10)||0; gs.scrollLeft=s;
      if(ui.tab==="plan"){
        var rs=gs.getAttribute("data-render-start");
        var board=document.getElementById("avail-board");
        var lastWk=null, ticking=false;
        var sync=function(){
          if(!rs) return;
          var di=Math.floor(gs.scrollLeft/DAY_W);
          var dd=addDays(parseIso(rs), di);
          var wdShort=WEEKDAYS[(dd.getDay()+6)%7];
          var flag=document.getElementById("scroll-marker-flag");
          if(flag) flag.textContent = wdShort+" "+pad(dd.getDate())+"."+pad(dd.getMonth()+1)+".";
          var pr=document.getElementById("pos-readout");
          if(pr) pr.textContent = wdShort+", "+fmtDE(iso(dd))+" · KW "+isoWeek(dd);
          var wk=iso(startOfWeek(dd));
          if(board && wk!==lastWk){ lastWk=wk; board.innerHTML=availInner(parseIso(wk)); }
        };
        gs.addEventListener("scroll", function(){
          if(ticking) return; ticking=true;
          requestAnimationFrame(function(){ ticking=false; sync(); });
        });
        sync(); // beim Laden direkt auf die aktuelle (Anker-)Woche stellen
      }
    }
  }

  function closeModal(){ document.getElementById("modal-root").innerHTML=""; }

  // Eigener Bestätigungsdialog (unabhängig von window.confirm, das in Vorschauen blockiert sein kann)
  function confirmDialog(msg, onYes, opts){
    opts=opts||{}; var yesLabel=opts.yesLabel||"Löschen";
    var yesStyle=opts.brand?'background:var(--brand);border-color:var(--brand);color:#fff':'background:#dc2626;border-color:#dc2626;color:#fff';
    var wrap=document.createElement("div");
    wrap.className="overlay"; wrap.style.zIndex="1100";
    wrap.innerHTML='<div class="modal" style="max-width:400px">'+
      '<div class="modal-head"><h2>'+(opts.title||"Bestätigen")+'</h2></div>'+
      '<div style="padding:20px 24px;font-size:14px;line-height:1.5">'+esc(msg)+'</div>'+
      '<div class="modal-foot"><div></div><div style="display:flex;gap:10px">'+
        '<button class="btn" data-cd="no">Abbrechen</button>'+
        '<button class="btn" data-cd="yes" style="'+yesStyle+'">'+esc(yesLabel)+'</button>'+
      '</div></div></div>';
    document.body.appendChild(wrap);
    wrap.addEventListener("click", function(e){
      var t=e.target;
      if(t===wrap || (t.getAttribute && t.getAttribute("data-cd")==="no")){ wrap.remove(); }
      else if(t.getAttribute && t.getAttribute("data-cd")==="yes"){ wrap.remove(); onYes(); }
    });
  }
  function field(lbl,inner,full){ return '<div class="field'+(full?" full":"")+'"><label>'+lbl+'</label>'+inner+'</div>'; }

  // Kontinent eines Landes ermitteln
  function continentOf(country){
    if(!country) return "";
    for(var i=0;i<CONTINENT_ORDER.length;i++){ if(COUNTRIES_BY_CONTINENT[CONTINENT_ORDER[i]].indexOf(country)!==-1) return CONTINENT_ORDER[i]; }
    return "";
  }
  function continentOptions(selected){
    var html='<option value=""'+(!selected?" selected":"")+'>— Kontinent wählen —</option>';
    CONTINENT_ORDER.forEach(function(c){ html+='<option'+(c===selected?" selected":"")+'>'+esc(c)+'</option>'; });
    return html;
  }
  // Länder eines Kontinents, alphabetisch
  function countryOptionsFor(cont, selected){
    var html='<option value=""'+(!selected?" selected":"")+'>— Land wählen —</option>';
    var list = (cont && COUNTRIES_BY_CONTINENT[cont]) ? COUNTRIES_BY_CONTINENT[cont].slice().sort(function(a,b){ return a.localeCompare(b,"de"); }) : [];
    var found=false;
    list.forEach(function(c){ var s=(c===selected); if(s)found=true; html+='<option'+(s?" selected":"")+'>'+esc(c)+'</option>'; });
    if(selected && !found){ html+='<option selected>'+esc(selected)+'</option>'; }
    return html;
  }

  // Überschneidungen eines Monteurs im Zeitraum finden
  function findConflicts(empId, start, end, excludeId){
    return store.assignments.filter(function(a){
      if(a.employee_id!==empId) return false;
      if(excludeId && a.id===excludeId) return false;
      return a.start_date<=end && a.end_date>=start; // Zeiträume überlappen
    }).sort(function(a,b){ return a.start_date.localeCompare(b.start_date); });
  }

  // Ist der Monteur an diesem Tag bereits verplant (egal welche Art)?
  function dayOccupied(empId, dIso){
    return store.assignments.some(function(a){ return a.employee_id===empId && a.start_date<=dIso && a.end_date>=dIso; });
  }
  // Nächster freier Tag eines Monteurs ab heute (oder ab fromIso)
  function nextFreeDate(empId, fromIso){
    var base = fromIso || iso(new Date());
    if(!empId) return base;
    var d=parseIso(base);
    for(var i=0;i<2000;i++){ var s=iso(d); if(!dayOccupied(empId,s)) return s; d=addDays(d,1); }
    return base;
  }

  // Geführter Dialog (3 Schritte) zum Anlegen/Bearbeiten eines Einsatzes
  function openAssignModal(existing, prefill){
    var first=employeesSorted()[0];
    var initEmp = existing?existing.employee_id : ((prefill&&prefill.employee_id)||(first?first.id:0));
    var initStart = existing ? existing.start_date
      : ((prefill&&prefill.start_date) || nextFreeDate(initEmp));
    var initEnd = existing ? existing.end_date
      : ((prefill&&prefill.end_date) || initStart);
    var w={
      step:1,
      employee_id: initEmp,
      type: existing?existing.type : ((prefill&&prefill.type)||"montage"),
      label: existing?(existing.label||""):"",
      country: existing?(existing.country||""):"",
      continent: continentOf(existing?(existing.country||""):((prefill&&prefill.country)||"")),
      city: existing?(existing.city||""):"",
      start_date: initStart,
      end_date: initEnd,
      notes: existing?(existing.notes||""):"",
      _isNew: !existing
    };
    var excludeId = existing?existing.id:null;

    function getConflicts(){
      if(!w.employee_id||!w.start_date||!w.end_date||w.end_date<w.start_date) return [];
      return findConflicts(+w.employee_id, w.start_date, w.end_date, excludeId);
    }
    function conflictBoxHTML(){
      if(!w.employee_id||!w.start_date||!w.end_date) return '<div class="hint">Zeitraum wählen, um die Verfügbarkeit zu prüfen.</div>';
      if(w.end_date<w.start_date) return '<div class="avail warn">Enddatum liegt vor dem Startdatum.</div>';
      var cs=getConflicts();
      if(!cs.length) return '<div class="avail ok">✓ '+esc(empName(+w.employee_id))+' ist in diesem Zeitraum frei.</div>';
      var li=cs.map(function(a){ var kind=a.type==="urlaub"?"Urlaub":"Doppelbelegung";
        return '<li><b>'+kind+'</b>: '+(a.label?esc(a.label)+" · ":"")+TYPE_LABEL[a.type]+' ('+fmtDE(a.start_date)+' – '+fmtDE(a.end_date)+')</li>'; }).join("");
      return '<div class="avail warn">⚠ Konflikt für '+esc(empName(+w.employee_id))+':<ul>'+li+'</ul></div>';
    }
    function maxStep(){ return w.type==="urlaub" ? 2 : 3; }
    function stepperHTML(){
      function d(n,lbl){ return '<span class="dot'+(w.step===n?" cur":(w.step>n?" done":""))+'">'+n+'</span><span class="dot-l'+(w.step>=n?" on":"")+'">'+lbl+'</span>'; }
      var s='<div class="stepper">'+d(1,"Wer & Was")+'<span class="sep"></span>'+d(2,"Zeitraum");
      if(maxStep()>=3){ s+='<span class="sep"></span>'+d(3,"Details"); }
      return s+'</div>';
    }
    function empSelectOptions(selectedId){
      var byTeam={};
      store.employees.forEach(function(e){ var k=e.team||"Ohne Team"; (byTeam[k]=byTeam[k]||[]).push(e); });
      var teamNames=Object.keys(byTeam).sort(function(a,b){
        var ma=Math.min.apply(null, byTeam[a].map(function(e){return e.sort_order;}));
        var mb=Math.min.apply(null, byTeam[b].map(function(e){return e.sort_order;}));
        return ma-mb;
      });
      return teamNames.map(function(t){
        var list=byTeam[t].slice().sort(function(x,y){ return x.name.localeCompare(y.name,"de"); });
        return '<optgroup label="'+esc(t)+'">'+
          list.map(function(e){ return '<option value="'+e.id+'"'+(+selectedId===e.id?" selected":"")+'>'+esc(e.name)+'</option>'; }).join("")+
          '</optgroup>';
      }).join("");
    }
    function bodyStep1(){
      var empOpts=empSelectOptions(w.employee_id);
      var typeOpts=TYPES.map(function(t){ return '<option value="'+t+'"'+(w.type===t?" selected":"")+'>'+TYPE_LABEL[t]+'</option>'; }).join("");
      return '<div class="modal-body" style="grid-template-columns:1fr">'+
        field("Monteur *",'<select id="w-emp">'+empOpts+'</select>',true)+
        field("Einsatzart *",'<select id="w-type">'+typeOpts+'</select>',true)+'</div>';
    }
    function bodyStep2(){
      return '<div class="modal-body">'+
        field("Startdatum *",'<input type="date" id="w-start" value="'+w.start_date+'"/>')+
        field("Enddatum *",'<input type="date" id="w-end" value="'+w.end_date+'"/>')+
        '<div class="full" id="w-conflict">'+conflictBoxHTML()+'</div></div>';
    }
    function bodyStep3(){
      var sum='<div class="avail" style="background:var(--hover);color:var(--text)"><b>'+esc(empName(+w.employee_id))+'</b> · '+TYPE_LABEL[w.type]+' · '+(w.start_date?fmtDE(w.start_date):"?")+' – '+(w.end_date?fmtDE(w.end_date):"?")+'</div>';
      return '<div class="modal-body">'+
        '<div class="full">'+sum+'</div>'+
        field("Projekt / Kunde",'<input type="text" id="w-label" value="'+esc(w.label)+'" placeholder="z. B. MDLZ LHF France"/>')+
        field("Stadt",'<input type="text" id="w-city" value="'+esc(w.city)+'"/>')+
        field("Kontinent",'<select id="w-continent">'+continentOptions(w.continent)+'</select>')+
        field("Land",'<select id="w-country">'+countryOptionsFor(w.continent, w.country)+'</select>')+
        '<div class="full">'+conflictBoxHTML()+'</div>'+
        field("Bemerkungen",'<textarea id="w-notes" rows="2">'+esc(w.notes)+'</textarea>',true)+'</div>';
    }
    function readStep(){
      if(w.step===1){ var e=document.getElementById("w-emp"); if(e)w.employee_id=+e.value; var t=document.getElementById("w-type"); if(t)w.type=t.value; }
      else if(w.step===2){ var s=document.getElementById("w-start"); if(s)w.start_date=s.value; var en=document.getElementById("w-end"); if(en)w.end_date=en.value; }
      else if(w.step===3){ var l=document.getElementById("w-label"); if(l)w.label=l.value;
        var co=document.getElementById("w-continent"); if(co)w.continent=co.value;
        var c=document.getElementById("w-country"); if(c)w.country=c.value;
        var ci=document.getElementById("w-city"); if(ci)w.city=ci.value; var n=document.getElementById("w-notes"); if(n)w.notes=n.value; }
    }
    function showErr(m){ var e=document.getElementById("w-err"); if(e){ e.textContent=m; e.style.display="block"; } }

    function renderWiz(){
      var body = w.step===1?bodyStep1(): w.step===2?bodyStep2(): bodyStep3();
      var back = w.step>1?'<button class="btn" id="w-back">‹ Zurück</button>':'<button class="btn" data-close>Abbrechen</button>';
      var next = w.step<maxStep()?'<button class="btn btn-primary" id="w-next">Weiter ›</button>':'<button class="btn btn-primary" id="w-save">Speichern</button>';
      var del = existing?'<button class="danger" data-del-assign="'+existing.id+'">Löschen</button>':'';
      document.getElementById("modal-root").innerHTML='<div class="overlay" data-overlay><div class="modal">'+
        '<div class="modal-head"><h2>'+(existing?"Einsatz bearbeiten":"Neuer Einsatz")+'</h2><button class="close-x" data-close>×</button></div>'+
        stepperHTML()+body+
        '<div class="err" id="w-err" style="display:none"></div>'+
        '<div class="modal-foot"><div>'+del+'</div><div style="display:flex;gap:10px">'+back+next+'</div></div>'+
        '</div></div>';

      if(w.step===2){
        var elS=document.getElementById("w-start"), elE=document.getElementById("w-end");
        var updateConflict=function(){ var box=document.getElementById("w-conflict"); if(box)box.innerHTML=conflictBoxHTML(); };
        var onStart=function(){
          var newStart=elS.value, oldStart=w.start_date, oldEnd=w.end_date;
          if(newStart){
            if(oldStart && oldEnd && oldEnd>=oldStart){
              // bisherige Dauer beibehalten -> Ende zieht mit
              var dur=diffDays(parseIso(oldStart), parseIso(oldEnd));
              var ne=iso(addDays(parseIso(newStart), dur)); w.end_date=ne; if(elE)elE.value=ne;
            } else if(!oldEnd || oldEnd<newStart){
              // kein/ungültiges Ende -> auf Startdatum setzen
              w.end_date=newStart; if(elE)elE.value=newStart;
            }
          }
          w.start_date=newStart; updateConflict();
        };
        var onEnd=function(){ if(elE)w.end_date=elE.value; updateConflict(); };
        if(elS){ elS.oninput=onStart; elS.onchange=onStart; }
        if(elE){ elE.oninput=onEnd; elE.onchange=onEnd; }
      }
      if(w.step===1){
        var ts=document.getElementById("w-type");
        if(ts) ts.onchange=function(){ readStep(); renderWiz(); };
        var es=document.getElementById("w-emp");
        if(es) es.onchange=function(){
          readStep();
          if(w._isNew){ var nf=nextFreeDate(+w.employee_id); w.start_date=nf; w.end_date=nf; }
          renderWiz();
        };
      }
      if(w.step===3){
        var contSel=document.getElementById("w-continent");
        if(contSel) contSel.onchange=function(){
          w.continent=contSel.value; w.country="";
          var ctrySel=document.getElementById("w-country");
          if(ctrySel) ctrySel.innerHTML=countryOptionsFor(w.continent,"");
        };
      }
      var nb=document.getElementById("w-next"); if(nb)nb.onclick=function(){ readStep();
        if(w.step===1 && !w.employee_id){ showErr("Bitte einen Monteur wählen."); return; }
        if(w.step===2){ if(!w.start_date||!w.end_date){ showErr("Bitte Start- und Enddatum angeben."); return; }
          if(w.end_date<w.start_date){ showErr("Enddatum darf nicht vor dem Startdatum liegen."); return; } }
        w.step++; renderWiz(); };
      var bb=document.getElementById("w-back"); if(bb)bb.onclick=function(){ readStep(); w.step--; renderWiz(); };
      var sv=document.getElementById("w-save"); if(sv)sv.onclick=function(){ readStep();
        if(!w.employee_id||!w.start_date||!w.end_date){ showErr("Monteur, Start- und Enddatum sind erforderlich."); return; }
        if(w.end_date<w.start_date){ showErr("Enddatum darf nicht vor dem Startdatum liegen."); return; }
        if(w.type==="urlaub" && !(w.label && w.label.trim())) w.label="Urlaub";
        var doSave=function(){ upsertAssignment({employee_id:w.employee_id,type:w.type,label:w.label,country:w.country,city:w.city,start_date:w.start_date,end_date:w.end_date,notes:w.notes}, existing?existing.id:null); closeModal(); render(); };
        var cs=getConflicts();
        if(cs.length){ confirmDialog("Für "+empName(+w.employee_id)+" besteht in diesem Zeitraum ein Konflikt (Urlaub oder Doppelbelegung). Trotzdem speichern?", doSave, {title:"Konflikt", yesLabel:"Trotzdem speichern", brand:true}); }
        else doSave();
      };
    }
    renderWiz();
  }

      try{ localStorage.setItem("hema_sb_url",url); localStorage.setItem("hema_sb_key",key); }catch(e){}
      closeModal(); initCloud();
      if(cloud.on){ cloudLoad(); } else { cloud.status="local"; render(); }
    };
  }

  // ---------- CSV-Export ----------
  // ---------- Sicherung (Backup) & Wiederherstellung ----------
  function exportBackup(){
    var data={ app:"HEMA Einsatzplanung", version:1, exportedAt:new Date().toISOString(),
      employees:store.employees, assignments:store.assignments, seqE:store.seqE, seqA:store.seqA };
    var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob); var a=document.createElement("a");
    var d=new Date();
    a.download="hema-einsatzplanung-sicherung-"+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+".json";
    a.href=url; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }
  function importBackup(){
    var inp=document.createElement("input");
    inp.type="file"; inp.accept=".json,application/json"; inp.style.display="none";
    document.body.appendChild(inp);
    inp.onchange=function(){
      var file=inp.files && inp.files[0];
      document.body.removeChild(inp);
      if(!file) return;
      var reader=new FileReader();
      reader.onload=function(){
        var data;
        try { data=JSON.parse(reader.result); } catch(e){ alert("Die Datei konnte nicht gelesen werden (kein gültiges Sicherungsformat)."); return; }
        if(!data || !Array.isArray(data.employees) || !Array.isArray(data.assignments)){
          alert("Das ist keine gültige Sicherungsdatei dieser App."); return;
        }
        confirmDialog("Die aktuell gespeicherten Daten werden durch die Sicherung ersetzt ("+data.employees.length+" Monteure, "+data.assignments.length+" Einsätze). Fortfahren?",
          function(){
            store.employees=data.employees; store.assignments=data.assignments;
            store.seqE = data.seqE || (Math.max(0,...store.employees.map(function(e){return e.id;}))+1);
            store.seqA = data.seqA || (Math.max(0,...store.assignments.map(function(a){return a.id;}))+1);
            persist(); ui.selectedEmployee=null; render();
            if(cloud.on){ // Sicherung auch in die Cloud schreiben – ZUERST Monteure, DANN Einsätze
              cloud.status="connecting"; render();
              var pushEmps = store.employees.length
                ? cloud.sb.from("employees").upsert(store.employees.map(mapEmp))
                : Promise.resolve({error:null});
              Promise.resolve(pushEmps).then(function(r){
                if(r && r.error){ cloudErr(r.error); render(); return; }
                var pushAsgs = store.assignments.length
                  ? cloud.sb.from("assignments").upsert(store.assignments.map(mapAsg))
                  : Promise.resolve({error:null});
                return Promise.resolve(pushAsgs).then(function(r2){
                  if(r2 && r2.error){ cloudErr(r2.error); render(); return; }
                  cloud.status="connected"; cloud.error=""; render();
                });
              }).catch(function(e){ cloudErr(e); render(); });
            }
          }, {title:"Sicherung laden", yesLabel:"Daten ersetzen", brand:true});
      };
      reader.readAsText(file);
    };
    inp.click();
  }

  function exportCSV(){
    var head=["Monteur","Team","Art","Projekt/Kunde","Land","Stadt","Start","Ende","Bemerkungen"];
    var rows=store.assignments.slice().sort(function(a,b){return a.start_date.localeCompare(b.start_date);}).map(function(a){
      return [empName(a.employee_id),empTeam(a.employee_id)||"",TYPE_LABEL[a.type],a.label||"",a.country||"",a.city||"",a.start_date,a.end_date,(a.notes||"").replace(/\n/g," ")];
    });
    var csv=[head].concat(rows).map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(";"); }).join("\r\n");
    var blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});
    var url=URL.createObjectURL(blob); var aEl=document.createElement("a");
    aEl.href=url; aEl.download="einsatzplan.csv"; document.body.appendChild(aEl); aEl.click();
    document.body.removeChild(aEl); URL.revokeObjectURL(url);
  }

  // ---------- Event-Delegation ----------
  document.addEventListener("click", function(ev){
    // Klick direkt auf den dunklen Hintergrund schließt das Modal (nicht bei Klick im Fenster)
    if(ev.target.matches && ev.target.matches(".overlay[data-overlay]")){ closeModal(); return; }

    var el=ev.target.closest("[data-tab],[data-act],[data-bar],[data-track],[data-filter],[data-open-emp],[data-edit-assign],[data-edit-emp],[data-del-assign],[data-del-emp],[data-close]");
    if(!el) return;

    if(el.hasAttribute("data-close")){ closeModal(); return; }
    if(el.hasAttribute("data-tab")){ ui.tab=el.getAttribute("data-tab"); ui.selectedEmployee=null; render(); return; }

    if(el.hasAttribute("data-open-emp")){ ui.selectedEmployee=+el.getAttribute("data-open-emp"); render(); return; }

    if(el.hasAttribute("data-bar")){ ev.stopPropagation();
      var aid=+el.getAttribute("data-bar"); var a=store.assignments.find(function(x){return x.id===aid;});
      if(a) openAssignModal(a,null); return; }

    if(el.hasAttribute("data-track")){
      var eid=+el.getAttribute("data-track"); var rect=el.getBoundingClientRect();
      var di=Math.floor((ev.clientX-rect.left)/DAY_W);
      var past=Math.min(ui.weeks,26)*7;
      var renderStart=addDays(parseIso(ui.windowStart),-past);
      var total=ui.weeks*7+past;
      if(di<0||di>=total) return;
      var date=iso(addDays(renderStart,di));
      openAssignModal(null,{employee_id:eid,start_date:date,end_date:date,type:"montage"}); return; }

    if(el.hasAttribute("data-filter")){ ui.typeFilter=el.getAttribute("data-filter"); render(); return; }
    if(el.hasAttribute("data-edit-assign")){ var id=+el.getAttribute("data-edit-assign");
      var a2=store.assignments.find(function(x){return x.id===id;}); if(a2) openAssignModal(a2,null); return; }
    if(el.hasAttribute("data-edit-emp")){ var eid2=+el.getAttribute("data-edit-emp");
      var e2=store.employees.find(function(x){return x.id===eid2;}); if(e2) openEmpModal(e2); return; }
    if(el.hasAttribute("data-del-assign")){ var daid=+el.getAttribute("data-del-assign");
      confirmDialog("Diesen Einsatz wirklich löschen?", function(){ deleteAssignment(daid); closeModal(); render(); }); return; }
    if(el.hasAttribute("data-del-emp")){ var deid=+el.getAttribute("data-del-emp");
      confirmDialog("Monteur und alle zugehörigen Einsätze wirklich löschen?", function(){ deleteEmployee(deid); ui.selectedEmployee=null; closeModal(); render(); }); return; }

    if(el.hasAttribute("data-act")){
      var act=el.getAttribute("data-act");
      if(act==="theme"){ setTheme(ui.theme==="dark"?"light":"dark"); render(); }
      else if(act==="new-assign"){ openAssignModal(null,null); }
      else if(act==="new-assign-for"){ var fid=+el.getAttribute("data-emp");
        openAssignModal(null,{employee_id:fid,type:"montage"}); }
      else if(act==="emp-back"){ ui.selectedEmployee=null; render(); }
      else if(act==="new-emp"){ openEmpModal(null); }
      else if(act==="export"){ exportCSV(); }
      else if(act==="backup"){ exportBackup(); }
      else if(act==="restore"){ importBackup(); }
      else if(act==="cloud"){ openCloudModal(); }
      else if(act==="cloud-disconnect"){ try{localStorage.removeItem("hema_sb_url");localStorage.removeItem("hema_sb_key");}catch(e){} cloud.on=false; cloud.subscribed=false; cloud.status="local"; cloud.error=""; closeModal(); render(); }
      else if(act==="cloud-reload"){ cloudLoad(); closeModal(); }
      else if(act==="prev"){ ui.windowStart=iso(addDays(parseIso(ui.windowStart),-28)); render(); }
      else if(act==="next"){ ui.windowStart=iso(addDays(parseIso(ui.windowStart),28)); render(); }
      else if(act==="today"){ ui.windowStart=iso(startOfWeek(new Date())); render(); }
      return;
    }
  });

  // change events (weeks-select, search)
  document.addEventListener("input", function(ev){
    if(ev.target.id==="search"){ ui.search=ev.target.value;
      // nur Tabellenkörper aktualisieren, Fokus bleibt erhalten
      var body=document.getElementById("list-body");
      var rows=filteredAssignments();
      if(body){ body.innerHTML=buildListBody(rows); }
      else { render(); var s=document.getElementById("search"); if(s){ s.focus(); s.value=ui.search; } }
    }
  });
  document.addEventListener("change", function(ev){
    if(ev.target.getAttribute && ev.target.getAttribute("data-act")==="weeks"){ ui.weeks=+ev.target.value; render(); }
    if(ev.target.getAttribute && ev.target.getAttribute("data-act")==="jump"){ var v=ev.target.value; if(v){ ui.windowStart=iso(startOfWeek(parseIso(v))); render(); } }
    if(ev.target.getAttribute && ev.target.getAttribute("data-act")==="stats-year"){ ui.statsYear=ev.target.value; render(); }
    if(ev.target.getAttribute && ev.target.getAttribute("data-act")==="stats-team"){ ui.statsTeam=ev.target.value; render(); }
    if(ev.target.getAttribute && ev.target.getAttribute("data-act")==="stats-emp"){ ui.statsEmp=ev.target.value; render(); }
    if(ev.target.getAttribute && ev.target.getAttribute("data-act")==="team-filter"){ ui.teamFilter=ev.target.value; render(); }
    if(ev.target.getAttribute && ev.target.getAttribute("data-act")==="list-emp"){ var v=ev.target.value; ui.selectedEmployee = v? +v : null; render(); }
    if(ev.target.getAttribute && ev.target.getAttribute("data-act")==="emp-select"){ var ve=ev.target.value; ui.selectedEmployee = ve? +ve : null; render(); }
  });

  // ---------- Balken ziehen / verlängern (Maus) ----------
  document.addEventListener("mousedown", function(e){
    if(e.button!==0) return;
    var bar=e.target.closest && e.target.closest(".bar");
    if(!bar) return;
    var id=+bar.getAttribute("data-bar");
    var a=store.assignments.find(function(x){return x.id===id;});
    if(!a) return;
    e.preventDefault();

    var mode="move";
    if(e.target.classList.contains("bar-h-l")) mode="resize-l";
    else if(e.target.classList.contains("bar-h-r")) mode="resize-r";

    var startX=e.clientX;
    var origLeft=parseFloat(bar.style.left)||0;
    var origWidth=parseFloat(bar.style.width)||DAY_W;
    var moved=false, lastDays=0;
    bar.classList.add("dragging");
    document.body.style.userSelect="none";

    function mm(ev){
      var days=Math.round((ev.clientX-startX)/DAY_W);
      if(days===lastDays) return;
      lastDays=days; if(days!==0) moved=true;
      if(mode==="move"){ bar.style.left=(origLeft+days*DAY_W)+"px"; }
      else if(mode==="resize-r"){ bar.style.width=Math.max(DAY_W-2, origWidth+days*DAY_W)+"px"; }
      else if(mode==="resize-l"){ var nl=origLeft+days*DAY_W, nw=origWidth-days*DAY_W;
        if(nw>=DAY_W-2){ bar.style.left=nl+"px"; bar.style.width=nw+"px"; } }
    }
    function mu(ev){
      document.removeEventListener("mousemove",mm); document.removeEventListener("mouseup",mu);
      document.body.style.userSelect=""; bar.classList.remove("dragging");
      var days=Math.round((ev.clientX-startX)/DAY_W);
      if(!moved || days===0) return; // reiner Klick -> Bearbeiten (normaler click-Handler)
      var s=parseIso(a.start_date), en=parseIso(a.end_date);
      if(mode==="move"){ a.start_date=iso(addDays(s,days)); a.end_date=iso(addDays(en,days)); }
      else if(mode==="resize-r"){ var ne=addDays(en,days); if(ne<s) ne=s; a.end_date=iso(ne); }
      else if(mode==="resize-l"){ var ns=addDays(s,days); if(ns>en) ns=en; a.start_date=iso(ns); }
      persist(); cloudUpsert("assignments", a);
      // den unmittelbar folgenden Klick unterdrücken, damit sich nicht der Dialog öffnet
      var supp=function(ce){ ce.stopPropagation(); ce.preventDefault(); window.removeEventListener("click",supp,true); };
      window.addEventListener("click",supp,true);
      setTimeout(function(){ window.removeEventListener("click",supp,true); },300);
      render();
    }
    document.addEventListener("mousemove",mm);
    document.addEventListener("mouseup",mu);
  });

  // ---------- Start ----------
  initCloud();
  setTheme(ui.theme);
  render();
  if(cloud.on){ cloudLoad(); }
  window.addEventListener("focus", function(){ if(cloud.on && cloud.status==="connected"){ cloudLoad(); } });
})();
</script>
